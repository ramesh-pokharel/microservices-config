server:
  port: 9191

spring:
  cloud:
    gateway:
      mvc:
        path-matching:
          case-sensitive: false
        routes:
          - id: PRODUCT-SERVICE
            uri: lb://product-service
            predicates:
              - Path=/products/**
          - id: ORDER-SERVICE
            uri: lb://order-service
            predicates:
              - Path=/orders/**